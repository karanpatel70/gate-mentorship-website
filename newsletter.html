<!-- NEWSLETTER SECTION -->
<section id="newsletter" style="background:linear-gradient(135deg,var(--surface),#1e293b); border-top:1px solid var(--border); text-align:center; padding:6rem 5%;">
  <div style="max-width:600px; margin:0 auto;">
    <span style="font-size:3rem; margin-bottom:1rem; display:block;">📬</span>
    <h2 style="font-size:clamp(1.5rem,3vw,2rem); font-weight:800; margin-bottom:1rem; color:var(--text);">Get Weekly GATE Strategies</h2>
    <p style="font-size:0.95rem; color:var(--muted); line-height:1.7; margin-bottom:2rem;">Join 500+ aspirants getting my best study tips, free PDFs, and mock test analysis techniques delivered straight to their inbox every Sunday.</p>
    
    <form action="https://formspree.io/f/xdawkkyz" method="POST" style="display:flex; gap:0.5rem; max-width:450px; margin:0 auto; flex-wrap:wrap; justify-content:center;">
      <input type="hidden" name="_subject" value="New Newsletter Subscriber!">
      <input type="email" name="email" placeholder="Enter your email address..." required style="flex:1; min-width:250px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.85rem 1.2rem; color:var(--text); font-family:'Sora',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s;">
      <button type="submit" class="btn-primary" style="padding:0.85rem 1.5rem; white-space:nowrap;">Subscribe Now</button>
    </form>
    <div style="font-size:0.75rem; color:var(--muted); margin-top:1rem; font-family:'JetBrains Mono',monospace;">No spam ever. Unsubscribe anytime.</div>
  </div>
</section>
<div class="divider"></div>
